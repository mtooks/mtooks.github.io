<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Matthew Li</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: "Space Grotesk", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ---- three synced fullscreen video layers ---- */
  .layer {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    pointer-events: none;
  }

  /* ---- overlay chrome (white via difference blend, readable on any video) ---- */
  .ui {
    position: fixed;
    z-index: 10;
    color: #fff;
    mix-blend-mode: difference;
  }
  .name {
    top: 26px; left: 30px;
    font-weight: 700;
    font-size: 20px;
    letter-spacing: 1px;
    text-transform: uppercase;
    text-decoration: none;
  }
  .links {
    top: 30px; right: 30px;
    display: flex;
    gap: 26px;
  }
  .links a {
    color: #fff;
    text-decoration: none;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: .85;
  }
  .links a:hover { opacity: 1; text-decoration: underline; text-underline-offset: 4px; }

  .hint {
    bottom: 30px; left: 30px;
    font-weight: 500;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    opacity: .55;
  }

  /* ---- mode buttons ---- */
  .modes {
    position: fixed;
    z-index: 10;
    bottom: 34px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 18px;
    mix-blend-mode: difference;
  }
  .modes button {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #fff;
    background: transparent;
    border: 1px solid rgba(255,255,255,.9);
    padding: 12px 28px;
    cursor: pointer;
    transition: background .15s ease, color .15s ease;
  }
  .modes button:hover {
    background: #fff;
    color: #000;
  }

  @media (max-width: 640px) {
    .name { top: 18px; left: 18px; font-size: 16px; }
    .links { top: 21px; right: 18px; gap: 14px; }
    .links a { font-size: 10px; letter-spacing: 1px; }
    .hint { display: none; }
    .modes { bottom: 22px; gap: 10px; }
    .modes button { padding: 10px 18px; font-size: 12px; letter-spacing: 2px; }
  }
</style>
</head>
<body>

<!-- All three videos play constantly, muted and looped, so any switch or
     peek window lands on the exact same timestamp. -->
<video id="v0" class="layer" src="landing/landing_normal.mp4" muted loop playsinline autoplay preload="auto"></video>
<video id="v1" class="layer" src="landing/landing_ascii.mp4"  muted loop playsinline autoplay preload="auto"></video>
<video id="v2" class="layer" src="landing/landing_glitch.mp4" muted loop playsinline autoplay preload="auto"></video>

<!-- clip regions (one per video) that the peek rectangles live in -->
<svg width="0" height="0" style="position:fixed">
  <defs>
    <clipPath id="cp0" clipPathUnits="userSpaceOnUse"></clipPath>
    <clipPath id="cp1" clipPathUnits="userSpaceOnUse"></clipPath>
    <clipPath id="cp2" clipPathUnits="userSpaceOnUse"></clipPath>
  </defs>
</svg>

<a class="ui name" href="./">Matthew&nbsp;Li</a>
<nav class="ui links">
  <a href="jeans/">Jeans</a>
  <a href="puerto-rico/">Puerto&nbsp;Rico</a>
  <a href="https://github.com/mtooks" target="_blank" rel="noopener">GitHub</a>
  <a href="mailto:matthewli2000@gmail.com">Email</a>
</nav>
<div class="ui hint">Drag L / R mouse to peek &middot; Esc clears</div>

<div class="modes" id="modes"></div>

<script>
  const SVGNS = 'http://www.w3.org/2000/svg';
  const videos = [
    document.getElementById('v0'),   // HOME   (normal)
    document.getElementById('v1'),   // ASCII
    document.getElementById('v2'),   // SPOOKY (glitch)
  ];
  const LABELS = ['Home', 'Ascii', 'Spooky'];
  const clips = [
    document.getElementById('cp0'),
    document.getElementById('cp1'),
    document.getElementById('cp2'),
  ];
  const modesEl = document.getElementById('modes');

  let base = 0;   // which video is fullscreen

  /* ---- layering: base video unclipped at the bottom, the other two
         above it, visible only inside their peek rectangles ---- */
  function applyLayers() {
    videos.forEach((v, i) => {
      if (i === base) {
        v.style.clipPath = 'none';
        v.style.zIndex = 1;
      } else {
        v.style.clipPath = `url(#cp${i})`;
        v.style.zIndex = 2;
      }
    });
  }

  /* Every user-drawn square remembers its cycle offset from the main
     video (LMB = +1, RMB = +2). When the main video changes, squares
     are re-homed to keep that offset, so they cycle along with it. */
  let squares = [];   // { rect, offset }

  function clearSquares() {
    squares.forEach(s => s.rect.remove());
    squares = [];
  }

  function rehomeSquares() {
    squares.forEach(s => clips[(base + s.offset) % 3].appendChild(s.rect));
  }

  function renderButtons() {
    modesEl.innerHTML = '';
    [(base + 1) % 3, (base + 2) % 3].forEach(i => {
      const b = document.createElement('button');
      b.textContent = LABELS[i];
      b.addEventListener('pointerdown', e => e.stopPropagation());
      b.addEventListener('click', e => { e.stopPropagation(); switchTo(i); });
      modesEl.appendChild(b);
    });
  }

  function switchTo(i) {
    if (i === base) return;
    base = i;
    applyLayers();
    rehomeSquares();
    renderButtons();
  }

  /* ---- keep the three videos frame-locked ---- */
  setInterval(() => {
    const master = videos[base];
    if (master.paused || !master.duration) return;
    videos.forEach(v => {
      if (v === master) return;
      if (Math.abs(v.currentTime - master.currentTime) > 0.08) {
        v.currentTime = master.currentTime;
      }
    });
  }, 2000);

  // Autoplay safety net: some browsers block until first interaction.
  function kick() { videos.forEach(v => v.play().catch(() => {})); }
  document.addEventListener('pointerdown', kick, { once: true });
  kick();

  /* ---- drag-to-peek rectangles ----
     LMB reveals the next video in the cycle, RMB the one after. */
  let drag = null;   // { rect, x0, y0 }

  document.addEventListener('contextmenu', e => e.preventDefault());

  document.addEventListener('pointerdown', e => {
    if (e.target instanceof Element && e.target.closest('a, button')) return;
    if (e.button !== 0 && e.button !== 2) return;
    const offset = e.button === 0 ? 1 : 2;
    const rect = document.createElementNS(SVGNS, 'rect');
    rect.setAttribute('x', e.clientX);
    rect.setAttribute('y', e.clientY);
    rect.setAttribute('width', 0);
    rect.setAttribute('height', 0);
    clips[(base + offset) % 3].appendChild(rect);
    squares.push({ rect, offset });
    drag = { rect, x0: e.clientX, y0: e.clientY };
  });

  document.addEventListener('pointermove', e => {
    if (!drag) return;
    drag.rect.setAttribute('x', Math.min(drag.x0, e.clientX));
    drag.rect.setAttribute('y', Math.min(drag.y0, e.clientY));
    drag.rect.setAttribute('width',  Math.abs(e.clientX - drag.x0));
    drag.rect.setAttribute('height', Math.abs(e.clientY - drag.y0));
  });

  function endDrag(e) {
    if (!drag) return;
    const w = Math.abs(e.clientX - drag.x0);
    const h = Math.abs(e.clientY - drag.y0);
    if (w < 12 || h < 12) {                     // a click, not a drag
      drag.rect.remove();
      squares = squares.filter(s => s.rect !== drag.rect);
    }
    drag = null;
  }
  document.addEventListener('pointerup', endDrag);
  document.addEventListener('pointercancel', endDrag);

  document.addEventListener('keydown', e => { if (e.key === 'Escape') clearSquares(); });
  document.addEventListener('dblclick', clearSquares);

  /* start with a couple of peek squares already on the wall:
     one LMB-style (ascii) and one RMB-style (spooky) */
  function addSquare(x, y, w, h, offset) {
    const rect = document.createElementNS(SVGNS, 'rect');
    rect.setAttribute('x', x);
    rect.setAttribute('y', y);
    rect.setAttribute('width', w);
    rect.setAttribute('height', h);
    clips[(base + offset) % 3].appendChild(rect);
    squares.push({ rect, offset });
  }
  addSquare(innerWidth * .7330, innerHeight * .4180, innerWidth * .1520, innerHeight * .3430, 2);
  addSquare(innerWidth * .5370, innerHeight * .2450, innerWidth * .1970, innerHeight * .3870, 1);
  addSquare(innerWidth * .3110, innerHeight * .4390, innerWidth * .0680, innerHeight * .1370, 2);
  addSquare(innerWidth * .3800, innerHeight * .5760, innerWidth * .0810, innerHeight * .1830, 1);
  addSquare(innerWidth * .8503, innerHeight * .9150, innerWidth * .0344, innerHeight * .0691, 2);
  addSquare(innerWidth * .0906, innerHeight * .0870, innerWidth * .0771, innerHeight * .1278, 2);
  addSquare(innerWidth * .1227, innerHeight * .2977, innerWidth * .0901, innerHeight * .1646, 1);
  addSquare(innerWidth * .2516, innerHeight * .1122, innerWidth * .0807, innerHeight * .1460, 1);
  addSquare(innerWidth * .1802, innerHeight * .5830, innerWidth * .0630, innerHeight * .1558, 2);
  addSquare(innerWidth * .4589, innerHeight * .0842, innerWidth * .0677, innerHeight * .0856, 2);
  addSquare(innerWidth * .7276, innerHeight * .1649, innerWidth * .0786, innerHeight * .1015, 2);
  addSquare(innerWidth * .8727, innerHeight * .2908, innerWidth * .0680, innerHeight * .1632, 2);
  addSquare(innerWidth * .9195, innerHeight * .5797, innerWidth * .0333, innerHeight * .1569, 2);
  addSquare(innerWidth * .6211, innerHeight * .8019, innerWidth * .0523, innerHeight * .0999, 2);
  addSquare(innerWidth * .4982, innerHeight * .7355, innerWidth * .0755, innerHeight * .0933, 1);
  addSquare(innerWidth * .4005, innerHeight * .8689, innerWidth * .0643, innerHeight * .1278, 2);
  addSquare(innerWidth * .4091, innerHeight * .2626, innerWidth * .0648, innerHeight * .1081, 2);
  addSquare(innerWidth * .7445, innerHeight * .9056, innerWidth * .0747, innerHeight * .1267, 1);
  addSquare(innerWidth * .2708, innerHeight * .7465, innerWidth * .0904, innerHeight * .1591, 1);

  applyLayers();
  renderButtons();
</script>
