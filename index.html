<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Matthew Li</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: "Space Grotesk", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ---- centered 16:9 stage that the videos live inside ---- */
  .stage {
    position: relative;
    width: min(calc(100vw - 80px), calc((100vh - 180px) * 16 / 9));
    aspect-ratio: 16 / 9;
    background: #000;
    overflow: hidden;
  }

  /* ---- three synced video layers, filling the stage ---- */
  .layer {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none;
  }

  /* ---- overlay chrome (white via difference blend, readable on any video) ---- */
  .ui {
    position: fixed;
    z-index: 10;
    color: #fff;
    mix-blend-mode: difference;
  }
  .name {
    top: 26px; left: 30px;
    font-weight: 700;
    font-size: 20px;
    letter-spacing: 1px;
    text-transform: uppercase;
    text-decoration: none;
  }
  .links {
    top: 30px; right: 30px;
    display: flex;
    gap: 26px;
  }
  .links a {
    color: #fff;
    text-decoration: none;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: .85;
  }
  .links a:hover { opacity: 1; text-decoration: underline; text-underline-offset: 4px; }

  .hint {
    bottom: 30px; left: 30px;
    font-weight: 500;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    opacity: .55;
  }

  /* ---- mode buttons ---- */
  .modes {
    position: fixed;
    z-index: 10;
    bottom: 34px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 18px;
    mix-blend-mode: difference;
  }
  .modes button {
    font-family: "Space Grotesk", sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #fff;
    background: transparent;
    border: 1px solid rgba(255,255,255,.9);
    padding: 12px 28px;
    cursor: pointer;
    transition: background .15s ease, color .15s ease;
  }
  .modes button:hover {
    background: #fff;
    color: #000;
  }
  .modes button.active {
    background: #fff;
    color: #000;
    cursor: default;
  }

  @media (max-width: 640px) {
    .name { top: 18px; left: 18px; font-size: 16px; }
    .links { top: 21px; right: 18px; gap: 14px; }
    .links a { font-size: 10px; letter-spacing: 1px; }
    .hint { display: none; }
    .modes { bottom: 22px; gap: 10px; }
    .modes button { padding: 10px 18px; font-size: 12px; letter-spacing: 2px; }
  }
</style>
</head>
<body>

<!-- All three videos play constantly, muted and looped, so any switch or
     peek window lands on the exact same timestamp. They live inside a
     centered 16:9 stage on a black background. -->
<div class="stage" id="stage">
  <video id="v0" class="layer" src="landing/landing_normal.mp4" muted loop playsinline autoplay preload="auto"></video>
  <video id="v1" class="layer" src="landing/landing_ascii.mp4"  muted loop playsinline autoplay preload="auto"></video>
  <video id="v2" class="layer" src="landing/landing_glitch.mp4" muted loop playsinline autoplay preload="auto"></video>
</div>

<!-- clip regions (one per video) that the peek rectangles live in -->
<svg width="0" height="0" style="position:fixed">
  <defs>
    <clipPath id="cp0" clipPathUnits="userSpaceOnUse"></clipPath>
    <clipPath id="cp1" clipPathUnits="userSpaceOnUse"></clipPath>
    <clipPath id="cp2" clipPathUnits="userSpaceOnUse"></clipPath>
  </defs>
</svg>

<a class="ui name" href="./">Matthew&nbsp;Li</a>
<nav class="ui links">
  <a href="fish/">Fish</a>
  <a href="puerto-rico/">Puerto&nbsp;Rico</a>
  <a href="https://github.com/mtooks" target="_blank" rel="noopener">GitHub</a>
  <a href="mailto:matthewli2000@gmail.com">Email</a>
</nav>
<div class="ui hint">Drag L / R mouse to peek &middot; Esc clears</div>

<div class="modes" id="modes"></div>

<script>
  const SVGNS = 'http://www.w3.org/2000/svg';
  const videos = [
    document.getElementById('v0'),   // HOME   (normal)
    document.getElementById('v1'),   // ASCII
    document.getElementById('v2'),   // SPOOKY (glitch)
  ];
  const LABELS = ['Home', 'Ascii', 'Spooky'];
  const clips = [
    document.getElementById('cp0'),
    document.getElementById('cp1'),
    document.getElementById('cp2'),
  ];
  const modesEl = document.getElementById('modes');
  const stage = document.getElementById('stage');

  /* Peek rectangles live in the video's own coordinate space, whose
     origin is the top-left of the stage. Convert pointer coords to it. */
  function toLocal(e) {
    const r = stage.getBoundingClientRect();
    return { x: e.clientX - r.left, y: e.clientY - r.top };
  }

  let base = 0;   // which video is fullscreen

  /* ---- layering: base video unclipped at the bottom, the other two
         above it, visible only inside their peek rectangles ---- */
  function applyLayers() {
    videos.forEach((v, i) => {
      if (i === base) {
        v.style.clipPath = 'none';
        v.style.zIndex = 1;
      } else {
        v.style.clipPath = `url(#cp${i})`;
        v.style.zIndex = 2;
      }
    });
  }

  /* Every user-drawn square remembers its cycle offset from the main
     video (LMB = +1, RMB = +2). When the main video changes, squares
     are re-homed to keep that offset, so they cycle along with it. */
  let squares = [];   // { rect, offset }

  function clearSquares() {
    squares.forEach(s => s.rect.remove());
    squares = [];
  }

  function rehomeSquares() {
    squares.forEach(s => clips[(base + s.offset) % 3].appendChild(s.rect));
  }

  function renderButtons() {
    modesEl.innerHTML = '';
    LABELS.forEach((label, i) => {
      const b = document.createElement('button');
      b.textContent = label;
      if (i === base) b.classList.add('active');
      b.addEventListener('pointerdown', e => e.stopPropagation());
      b.addEventListener('click', e => { e.stopPropagation(); switchTo(i); });
      modesEl.appendChild(b);
    });
  }

  function switchTo(i) {
    if (i === base) return;
    base = i;
    applyLayers();
    rehomeSquares();
    renderButtons();
  }

  /* ---- keep the three videos frame-locked ---- */
  setInterval(() => {
    const master = videos[base];
    if (master.paused || !master.duration) return;
    videos.forEach(v => {
      if (v === master) return;
      if (Math.abs(v.currentTime - master.currentTime) > 0.08) {
        v.currentTime = master.currentTime;
      }
    });
  }, 2000);

  // Autoplay safety net: some browsers block until first interaction.
  function kick() { videos.forEach(v => v.play().catch(() => {})); }
  document.addEventListener('pointerdown', kick, { once: true });
  kick();

  /* ---- drag-to-peek rectangles ----
     LMB reveals the next video in the cycle, RMB the one after. */
  let drag = null;   // { rect, x0, y0 }

  document.addEventListener('contextmenu', e => e.preventDefault());

  document.addEventListener('pointerdown', e => {
    if (e.target instanceof Element && e.target.closest('a, button')) return;
    if (e.button !== 0 && e.button !== 2) return;
    const p = toLocal(e);
    // only start a peek inside the video rectangle
    if (p.x < 0 || p.y < 0 || p.x > stage.clientWidth || p.y > stage.clientHeight) return;
    const offset = e.button === 0 ? 1 : 2;
    const rect = document.createElementNS(SVGNS, 'rect');
    rect.setAttribute('x', p.x);
    rect.setAttribute('y', p.y);
    rect.setAttribute('width', 0);
    rect.setAttribute('height', 0);
    clips[(base + offset) % 3].appendChild(rect);
    squares.push({ rect, offset });
    drag = { rect, x0: p.x, y0: p.y };
  });

  document.addEventListener('pointermove', e => {
    if (!drag) return;
    const p = toLocal(e);
    drag.rect.setAttribute('x', Math.min(drag.x0, p.x));
    drag.rect.setAttribute('y', Math.min(drag.y0, p.y));
    drag.rect.setAttribute('width',  Math.abs(p.x - drag.x0));
    drag.rect.setAttribute('height', Math.abs(p.y - drag.y0));
  });

  function endDrag(e) {
    if (!drag) return;
    const p = toLocal(e);
    const w = Math.abs(p.x - drag.x0);
    const h = Math.abs(p.y - drag.y0);
    if (w < 12 || h < 12) {                     // a click, not a drag
      drag.rect.remove();
      squares = squares.filter(s => s.rect !== drag.rect);
    }
    drag = null;
  }
  document.addEventListener('pointerup', endDrag);
  document.addEventListener('pointercancel', endDrag);

  document.addEventListener('keydown', e => { if (e.key === 'Escape') clearSquares(); });
  document.addEventListener('dblclick', clearSquares);

  /* start with a couple of peek squares already on the wall:
     one LMB-style (ascii) and one RMB-style (spooky) */
  function addSquare(x, y, w, h, offset) {
    const rect = document.createElementNS(SVGNS, 'rect');
    rect.setAttribute('x', x);
    rect.setAttribute('y', y);
    rect.setAttribute('width', w);
    rect.setAttribute('height', h);
    clips[(base + offset) % 3].appendChild(rect);
    squares.push({ rect, offset });
  }
  const sr = stage.getBoundingClientRect();
  const innerW = sr.width, innerH = sr.height;
  addSquare(innerW * .7330, innerH * .4180, innerW * .1520, innerH * .3430, 2);
  addSquare(innerW * .5370, innerH * .2450, innerW * .1970, innerH * .3870, 1);
  addSquare(innerW * .3110, innerH * .4390, innerW * .0680, innerH * .1370, 2);
  addSquare(innerW * .3800, innerH * .5760, innerW * .0810, innerH * .1830, 1);
  addSquare(innerW * .8503, innerH * .9150, innerW * .0344, innerH * .0691, 2);
  addSquare(innerW * .0906, innerH * .0870, innerW * .0771, innerH * .1278, 2);
  addSquare(innerW * .1227, innerH * .2977, innerW * .0901, innerH * .1646, 1);
  addSquare(innerW * .2516, innerH * .1122, innerW * .0807, innerH * .1460, 1);
  addSquare(innerW * .1802, innerH * .5830, innerW * .0630, innerH * .1558, 2);
  addSquare(innerW * .4589, innerH * .0842, innerW * .0677, innerH * .0856, 2);
  addSquare(innerW * .7276, innerH * .1649, innerW * .0786, innerH * .1015, 2);
  addSquare(innerW * .8727, innerH * .2908, innerW * .0680, innerH * .1632, 2);
  addSquare(innerW * .9195, innerH * .5797, innerW * .0333, innerH * .1569, 2);
  addSquare(innerW * .6211, innerH * .8019, innerW * .0523, innerH * .0999, 2);
  addSquare(innerW * .4982, innerH * .7355, innerW * .0755, innerH * .0933, 1);
  addSquare(innerW * .4005, innerH * .8689, innerW * .0643, innerH * .1278, 2);
  addSquare(innerW * .4091, innerH * .2626, innerW * .0648, innerH * .1081, 2);
  addSquare(innerW * .7445, innerH * .9056, innerW * .0747, innerH * .1267, 1);
  addSquare(innerW * .2708, innerH * .7465, innerW * .0904, innerH * .1591, 1);

  applyLayers();
  renderButtons();
</script>
