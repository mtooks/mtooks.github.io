<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Matthew Li</title>
<style>
  :root { --bg:#0f1115; --card:#191c23; --ink:#e8eaf0; --mut:#9aa3b2; --line:#272b34;
          --acc:#5b8cff; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
         font:16px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
         display:flex; justify-content:center; padding:64px 24px 96px; }
  .wrap { width:100%; max-width:760px; }
  h1 { font-family:"Times New Roman",Times,serif; font-weight:400; font-size:40px;
       margin:0 0 8px; letter-spacing:.3px; }
  .tagline { color:var(--mut); font-size:16px; margin:0 0 18px; }
  .social { display:flex; gap:18px; margin:0 0 56px; }
  .social a { color:var(--acc); text-decoration:none; font-size:14px; }
  .social a:hover { text-decoration:underline; }
  h2 { font-family:"Times New Roman",Times,serif; font-weight:400; font-size:14px;
       text-transform:uppercase; letter-spacing:2px; color:var(--mut); margin:0 0 18px; }
  .projects { display:grid; gap:14px; }
  .proj { display:block; text-decoration:none; color:inherit; background:var(--card);
          border:1px solid var(--line); border-radius:13px; padding:20px 22px;
          transition:transform .15s, border-color .15s; }
  .proj:hover { transform:translateY(-3px); border-color:var(--acc); }
  .proj h3 { margin:0 0 5px; font-size:18px; font-weight:600; }
  .proj p { margin:0; color:var(--mut); font-size:14.5px; }
  .proj .go { color:var(--acc); font-size:13.5px; margin-top:12px; display:inline-block; }
  footer { margin-top:64px; color:var(--mut); font-size:13px; }
</style></head><body>
<div class="wrap">
  <h1>Matthew Li</h1>
  <p class="tagline">Building small things on the internet.</p>
  <div class="social">
    <a href="https://github.com/mtooks" target="_blank" rel="noopener">GitHub</a>
    <a href="mailto:matthewli2000@gmail.com">Email</a>
  </div>

  <h2>Projects</h2>
  <div class="projects">
    <!-- Add a project: copy a block below, point href at a /subfolder/ or any URL. -->
    <a class="proj" href="jeans/">
      <h3>Naked &amp; Famous — The Archives</h3>
      <p>A searchable visual catalogue of every Naked &amp; Famous denim fabric —
         active and discontinued — with filters, a release timeline, and a
         click-to-zoom lightbox.</p>
      <span class="go">Open →</span>
    </a>
  </div>

  <footer>© Matthew Li</footer>
</div>

<script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "9f40017edaba4138a1639b797d880aa6"}'></script>
<!-- End Cloudflare Web Analytics -->
</body></html>
