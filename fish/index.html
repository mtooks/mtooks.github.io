<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fish — Matthew Li</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    background: #f0eeea;              /* matches the painting's paper */
    font-family: "Space Grotesk", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* the pond video fills the viewport; its cream background blends into the page */
  video {
    max-width: 100vw;
    max-height: 100vh;
    width: auto;
    height: auto;
    object-fit: contain;
    display: block;
  }

  /* overlay chrome — dark ink, readable on the pale paper */
  .ui {
    position: fixed;
    z-index: 10;
    color: #1a1a1a;
    text-decoration: none;
  }
  .name {
    top: 26px; left: 30px;
    font-weight: 700;
    font-size: 20px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .back {
    top: 30px; right: 30px;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: .7;
  }
  .back:hover { opacity: 1; text-decoration: underline; text-underline-offset: 4px; }

  @media (max-width: 640px) {
    .name { top: 18px; left: 18px; font-size: 16px; }
    .back { top: 21px; right: 18px; font-size: 10px; letter-spacing: 1px; }
  }
</style>
</head>
<body>

<video src="../pond_koi_threequarter.mp4" muted loop playsinline autoplay preload="auto"></video>
