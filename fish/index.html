<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: "Space Grotesk", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* same centered 16:9 stage as the landing page, black bars around it */
  .stage {
    position: relative;
    width: min(calc(100vw - 80px), calc((100vh - 180px) * 16 / 9));
    aspect-ratio: 16 / 9;
    background: #000;
    overflow: hidden;
  }
  .stage video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* overlay chrome (white via difference blend, matches landing) */
  .ui {
    position: fixed;
    z-index: 10;
    color: #fff;
    mix-blend-mode: difference;
    text-decoration: none;
  }
  .back {
    top: 26px; left: 34px;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: .85;
  }
  .back:hover { opacity: 1; text-decoration: underline; text-underline-offset: 4px; }

  @media (max-width: 640px) {
    .back { top: 18px; left: 20px; font-size: 10px; letter-spacing: 1px; }
  }
</style>
</head>
<body>

<div class="stage">
  <video src="../pond_koi_threequarter.mp4" muted loop playsinline autoplay preload="auto"></video>
</div>
