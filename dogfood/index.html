<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DOGFOOD — Matthew Li</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  @font-face {
    font-family: "Hit Me Punk";
    src: url("fonts/hitmepunk.ttf") format("truetype");
    font-display: swap;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100vh; height: 100dvh; overflow: hidden; }
  body {
    background: #000;
    color: #fff;
    font-family: "Space Grotesk", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 22px;
    padding: 58px 24px 28px;
  }

  /* ---- back link, matches the home page chrome ---- */
  .back {
    position: fixed;
    top: 26px; left: 30px;
    color: #fff;
    text-decoration: none;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: .7;
    z-index: 10;
  }
  .back:hover { opacity: 1; text-decoration: underline; text-underline-offset: 4px; }

  /* ---- big punk title (~1/3 of previous) ---- */
  .title {
    font-family: "Hit Me Punk", "Space Grotesk", sans-serif;
    font-weight: 400;
    text-align: center;
    line-height: .92;
    letter-spacing: 2px;
    font-size: clamp(28px, 7vw, 108px);
    margin: 0;
    color: #fff;
    flex: 0 0 auto;
  }

  /* ---- project blurb (Times New Roman) ---- */
  .blurb {
    font-family: "Times New Roman", Times, serif;
    max-width: 560px;
    text-align: center;
    font-size: 14px;
    line-height: 1.5;
    color: #cfcfcf;
    margin: 0;
    flex: 0 0 auto;
  }

  /* ---- the video: shrinks to fit, keeping 16:9 ---- */
  .film {
    flex: 1 1 auto;
    min-height: 0;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .film video {
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    aspect-ratio: 16 / 9;
    object-fit: contain;
    background: #0a0a0a;
    border: 1px solid rgba(255,255,255,.12);
    display: block;
  }

  @media (max-width: 640px) {
    body { padding: 52px 16px 20px; gap: 16px; }
    .blurb { font-size: 12px; }
  }
</style>
</head>
<body>

<a class="back" href="../">&larr;&nbsp;Matthew&nbsp;Li</a>

<h1 class="title">DOGFOOD!</h1>

<div class="film">
  <video src="dogfood.mp4" controls loop playsinline muted autoplay preload="metadata"></video>
</div>

<p class="blurb">
  I trained a GAN on volcano videos. Then I fed the training data back through
  the network and re-fed its own output in, the model slowly dogfooding itself
  into oblivion.
</p>
